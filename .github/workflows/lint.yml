name: lint

# Black formatting gate for first-party Python sources. Mirrors the
# pyproject.toml [tool.black] config (line-length=100, target=py310).
#
# Scope is narrowed to src/, tests/, and scripts/ on purpose:
# examples/runs/python23_probe/repos/* holds Python 2 migration
# fixtures whose ugliness is the point — reformatting them would
# defeat their purpose. Adding new top-level Python directories
# requires extending the path list here.

on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "scripts/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "scripts/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install black
        run: pip install "black>=24.0"

      - name: Check formatting
        run: black --check --diff src tests scripts
