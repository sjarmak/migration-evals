name: test

# Runs the full offline test suite (all tiers replay from cassettes; no API
# keys, Docker, or network needed — see CLAUDE.md). Guards against the
# clean-venv collection-break class of bug: any dependency-resolution change
# that stops `pytest` from collecting a test file fails here loudly.
#
# Matrix covers the full supported interpreter range (requires-python >=3.10)
# so version-specific breakage is caught on the minimum as well as the latest.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Editable install with dev extras
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -q
