# Recipe template for the go_import_rewrite migration.
#
# Covers the most common shape of mechanical Go transformations: the
# agent rewrites import paths across the module (deprecated library
# swap, vanity URL change, vendored-module relocation). Tier signal is
# high because import surgery commonly breaks compilation in non-obvious
# ways (transitive imports, type assertions across packages, vendored
# copies that no longer match the rewritten path).
#
# scripts/run_eval.py reads this template and synthesizes a per-instance
# <repo>/meta.json from the union of these recipe fields and the
# changeset-provider provenance (repo_url, commit_sha, workflow_id,
# agent_runner, agent_model). The funnel's runner then loads that
# meta.json and constructs a Recipe(dockerfile, build_cmd, test_cmd)
# for the trial.
#
# Update the dockerfile / build_cmd / test_cmd here when the migration's
# canonical build harness changes.

migration_id: go_import_rewrite
model_cutoff_date: "2025-01-01"

recipe:
  dockerfile: |
    FROM golang:1.22
    WORKDIR /work
    COPY . .
  build_cmd: "go build ./..."
  test_cmd: "go test ./..."

stamps:
  oracle_spec: configs/oracle_spec.yaml
  recipe_spec: configs/recipes/go_import_rewrite.yaml
  hypotheses: docs/hypotheses_and_thresholds.md
  # Per-recipe oracle calibration (m1w). Produced by
  # `scripts/calibrate.py` against
  # `tests/fixtures/calibration/go_import_rewrite/`. Required by the
  # publication gate under `--require-calibration`.
  calibration_report: configs/recipes/go_import_rewrite.calibration.json

# Batch-change quality oracles (dsm). All fields optional; an oracle
# whose inputs are missing emits a `skipped` verdict instead of a
# false-positive pass. The committed ground-truth + sed pattern below
# matches the canonical import-rewrite that the calibration corpus
# exercises (good_001_simple_rename); other shapes can opt out by
# omitting `quality:` from their per-instance meta.json.
quality:
  ground_truth_diff: configs/recipes/go_import_rewrite.ground_truth.diff
  touched_paths_allowlist:
    - "**/*.go"
  baseline_tool: sed
  baseline_pattern:
    match: 'github\.com/foo/oldpkg'
    replace: 'github.com/foo/newpkg'
    files: '*.go'
