# Recipe template for the node_lts_upgrade migration.
#
# Covers Node.js LTS-version upgrades (e.g. 18 -> 20 -> 22): the agent
# bumps `engines.node`, swaps APIs the new LTS removes or deprecates,
# and updates lockfile / package.json accordingly. Tier signal is high
# because Node breaking changes commonly surface at compile (npm ci /
# install resolution, native-addon rebuilds) and at tests (deprecated
# `url.parse`, `Buffer()` constructor, removed crypto algorithms, fetch
# / WHATWG-stream behavioural shifts, timers semantics).
#
# Funnel signal:
#   tier 0 (diff parses)              - real
#   tier 1 (compile / npm ci)         - real; catches lockfile drift,
#                                       missing engines support, native
#                                       addon ABI mismatches with the
#                                       new Node ABI.
#   tier 2 (tests / npm test)         - real; catches API breakage that
#                                       compiles cleanly but blows up at
#                                       runtime under the new LTS.
#
# scripts/run_eval.py reads this template and synthesizes a per-instance
# <repo>/meta.json from the union of these recipe fields and the
# changeset-provider provenance (repo_url, commit_sha, workflow_id,
# agent_runner, agent_model). The funnel's runner then loads that
# meta.json and constructs a Recipe(dockerfile, build_cmd, test_cmd)
# for the trial.
#
# `target_node_version` is the source of truth for which Node LTS this
# recipe builds against. The `recipe.dockerfile` FROM line below is
# pinned to the same major by hand; when bumping the target (e.g. to
# evaluate a 20 -> 22 upgrade corpus), update BOTH the
# `target_node_version` field and the `FROM node:<major>` line so they
# stay in sync. We deliberately avoid introducing a templating layer
# here (YAGNI) — a single integer in a recipe is not worth a rendering
# pipeline. Mirrors the `target_go_version` convention in
# `go_version_upgrade.yaml`.

migration_id: node_lts_upgrade
model_cutoff_date: "2025-01-01"

# Node LTS the sandbox builds against. Must match the FROM line in
# recipe.dockerfile below.
target_node_version: "20"

recipe:
  dockerfile: |
    FROM node:20
    WORKDIR /work
    COPY . .
  build_cmd: "npm ci"
  test_cmd: "npm test"

stamps:
  oracle_spec: configs/oracle_spec.yaml
  recipe_spec: configs/recipes/node_lts_upgrade.yaml
  hypotheses: docs/hypotheses_and_thresholds.md
